<style>
:root{
  --bg:#0d0d0d;--surface:#161616;--panel:#1e1e1e;--card:#242424;--border:#2e2e2e;
  --yellow:#f0c040;--ydim:rgba(240,192,64,0.12);--yborder:rgba(240,192,64,0.3);
  --green:#3ddc84;--gdim:rgba(61,220,132,0.12);
  --red:#ff6b6b;--blue:#5ba4ff;--orange:#ff9f43;
  --text:#f0f0f0;--sub:#c0c0c0;--muted:#909090;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;}
.login-box{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--yellow);padding:40px 36px;width:340px;border-radius:6px;}
.login-logo{font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:3px;color:var(--yellow);margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:28px;}
.lbl{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);margin-bottom:5px;display:block;}
.inp{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:11px 13px;font-family:var(--mono);font-size:14px;border-radius:4px;outline:none;margin-bottom:14px;transition:border-color .2s;}
.inp:focus{border-color:var(--yellow);}
.login-btn{width:100%;background:var(--yellow);color:#0d0d0d;border:none;padding:13px;font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:2px;cursor:pointer;border-radius:4px;transition:opacity .2s;text-transform:uppercase;}
.login-btn:hover{opacity:.85;}.login-btn:disabled{opacity:.5;cursor:not-allowed;}
.login-err{color:var(--red);font-size:12px;margin-top:10px;text-align:center;display:none;}

/* SHELL */
#appShell{display:none;flex-direction:column;height:100vh;overflow:hidden;}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:50px;display:flex;align-items:center;padding:0 16px;flex-shrink:0;}
.tb-brand{font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:2px;color:var(--yellow);}
.tb-sep{width:1px;height:20px;background:var(--border);margin:0 14px;}
.tb-title{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:1px;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.tb-user{font-family:var(--mono);font-size:11px;color:var(--sub);}
.logout-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 11px;font-family:var(--mono);font-size:11px;cursor:pointer;border-radius:3px;transition:all .2s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

/* STATS BAR */
.statsbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:10px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.statsbar::-webkit-scrollbar{display:none;}
.stat{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px 16px;display:flex;flex-direction:column;gap:3px;min-width:110px;flex-shrink:0;}
.stat-val{font-family:var(--mono);font-weight:700;font-size:20px;color:var(--yellow);line-height:1;}
.stat-val.green{color:var(--green);}
.stat-val.blue{color:var(--blue);}
.stat-val.orange{color:var(--orange);}
.stat-val.red{color:var(--red);}
.stat-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-family:var(--mono);}

/* FILTER BAR */
.filterbar{background:var(--panel);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:5px;height:40px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.filterbar::-webkit-scrollbar{display:none;}
.fb{background:none;border:1px solid var(--border);color:var(--sub);padding:4px 12px;font-family:var(--mono);font-size:11px;cursor:pointer;border-radius:20px;letter-spacing:.5px;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.fb:hover{color:var(--text);}.fb.active{background:var(--ydim);border-color:var(--yborder);color:var(--yellow);}
.fc{background:var(--card);color:var(--sub);font-size:10px;padding:1px 5px;border-radius:10px;font-family:var(--mono);}
.fb.active .fc{background:rgba(240,192,64,0.2);color:var(--yellow);}
.fb-space{margin-left:auto;flex-shrink:0;}
.search-inp{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 11px;font-family:var(--mono);font-size:12px;border-radius:20px;outline:none;width:150px;transition:border-color .2s;}
.search-inp:focus{border-color:var(--yborder);}.search-inp::placeholder{color:var(--muted);}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden;}

/* TICKET LIST */
.tlist{width:300px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;background:var(--surface);}
.tlist::-webkit-scrollbar{width:3px;}.tlist::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.titem{border-bottom:1px solid var(--border);padding:12px 14px;cursor:pointer;transition:background .1s;position:relative;}
.titem:hover{background:var(--panel);}.titem.active{background:var(--panel);border-left:3px solid var(--yellow);padding-left:11px;}
.ti-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.ti-code{font-family:var(--mono);font-weight:700;font-size:12px;color:var(--yellow);}
.ti-ago{font-size:11px;color:var(--muted);font-family:var(--mono);}
.ti-company{font-weight:600;font-size:14px;margin-bottom:2px;color:var(--text);}
.ti-meta{font-size:12px;color:var(--sub);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:5px;}
.ti-vol{color:var(--text);font-weight:600;}
.urgency-dot{position:absolute;top:12px;right:12px;width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.5px;border-radius:20px;text-transform:uppercase;}
.badge-NEW{background:rgba(91,164,255,0.12);color:var(--blue);border:1px solid rgba(91,164,255,0.25);}
.badge-PRICING{background:rgba(255,159,67,0.12);color:var(--orange);border:1px solid rgba(255,159,67,0.25);}
.badge-QUOTED{background:var(--ydim);color:var(--yellow);border:1px solid var(--yborder);}
.badge-CONFIRMED{background:var(--gdim);color:var(--green);border:1px solid rgba(61,220,132,0.25);}
.badge-DELIVERED{background:rgba(61,220,132,0.18);color:#7fffbe;border:1px solid rgba(61,220,132,0.35);}
.badge-CLOSED{background:rgba(96,96,96,0.15);color:var(--muted);border:1px solid var(--border);}

/* DETAIL */
.detail{flex:1;overflow-y:auto;background:var(--bg);}
.detail::-webkit-scrollbar{width:3px;}.detail::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.detail-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:8px;}
.detail-empty-icon{font-size:36px;opacity:.25;}.detail-empty-text{font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--muted);}
.d-inner{padding:20px;max-width:780px;}

/* STATUS ROW */
.status-row{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px 18px;margin-bottom:14px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.sr-code{font-family:var(--mono);font-weight:700;font-size:20px;color:var(--yellow);}
.sr-company{font-weight:700;font-size:18px;color:var(--text);margin:2px 0;}
.sr-time{font-size:11px;color:var(--muted);font-family:var(--mono);}
.sr-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}

/* STATUS BUTTONS */
.status-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.sbtn{padding:8px 14px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;border-radius:20px;transition:all .15s;text-transform:uppercase;border:1px solid var(--border);background:none;color:var(--sub);}
.sbtn:hover{color:var(--text);border-color:var(--sub);}
.sbtn.active-NEW{background:rgba(91,164,255,0.15);border-color:rgba(91,164,255,0.4);color:var(--blue);}
.sbtn.active-PRICING{background:rgba(255,159,67,0.15);border-color:rgba(255,159,67,0.4);color:var(--orange);}
.sbtn.active-QUOTED{background:var(--ydim);border-color:var(--yborder);color:var(--yellow);}
.sbtn.active-CONFIRMED{background:var(--gdim);border-color:rgba(61,220,132,0.35);color:var(--green);}
.sbtn.active-DELIVERED{background:rgba(61,220,132,0.18);border-color:rgba(61,220,132,0.4);color:#7fffbe;}
.sbtn.active-CLOSED{background:rgba(96,96,96,0.15);border-color:var(--border);color:var(--muted);}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:12px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:13px 14px;}
.card-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-family:var(--mono);}
.card-val{font-size:15px;font-weight:600;color:var(--text);line-height:1.3;}
.card-val.big{color:var(--yellow);font-family:var(--mono);font-size:22px;font-weight:700;}
.card-val.addr{font-size:13px;color:var(--sub);line-height:1.5;}
.card-val.urgent{color:var(--red);font-weight:700;}

/* SECTION */
.sec{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:18px 0 10px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* CONTACT ROW */
.contact-row{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.cr-name{font-weight:600;font-size:15px;margin-bottom:2px;color:var(--text);}
.cr-phone{font-size:14px;color:var(--sub);}
.cr-email{font-size:12px;color:var(--muted);}
.cr-btns{display:flex;gap:8px;}

/* AGENT */
.agent-sel{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 12px;font-family:var(--mono);font-size:12px;border-radius:4px;outline:none;width:100%;cursor:pointer;transition:border-color .2s;appearance:none;margin-bottom:14px;}
.agent-sel:focus{border-color:var(--yborder);}

/* QUOTE BUILDER */
.qb{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:18px;margin-bottom:14px;}
.qb-title{font-family:var(--mono);font-weight:700;font-size:12px;color:var(--yellow);margin-bottom:14px;letter-spacing:1px;}
.qb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:14px;}
.qb-grp{display:flex;flex-direction:column;gap:4px;}
.qb-lbl{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-family:var(--mono);}
.qb-inp{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 11px;font-family:var(--mono);font-size:13px;border-radius:4px;outline:none;transition:border-color .2s;width:100%;}
.qb-inp:focus{border-color:var(--yborder);}
.qb-calc{background:var(--ydim);border:1px solid var(--yborder);border-radius:4px;padding:12px 14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
.qc-lbl{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-family:var(--mono);margin-bottom:2px;}
.qc-val{font-family:var(--mono);font-weight:700;font-size:18px;color:var(--yellow);}
.qb-btns{display:flex;gap:8px;flex-wrap:wrap;}
.quote-out{background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--yellow);border-radius:4px;padding:16px;font-family:var(--mono);font-size:12px;line-height:1.9;white-space:pre-wrap;color:var(--text);margin-bottom:12px;display:none;}

/* NOTES */
.notes-ta{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:11px 13px;font-family:var(--mono);font-size:12px;border-radius:4px;outline:none;width:100%;resize:vertical;min-height:80px;transition:border-color .2s;line-height:1.7;}
.notes-ta:focus{border-color:var(--yborder);}.notes-ta::placeholder{color:var(--muted);}

/* BUTTONS */
.btn{padding:9px 16px;font-family:var(--mono);font-weight:700;font-size:11px;letter-spacing:.5px;cursor:pointer;border-radius:4px;transition:all .15s;text-transform:uppercase;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;}
.btn-y{background:var(--yellow);color:#0d0d0d;border:none;}.btn-y:hover{opacity:.85;}
.btn-g{background:var(--gdim);border:1px solid rgba(61,220,132,0.3);color:var(--green);}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--sub);}.btn-ghost:hover{border-color:var(--sub);color:var(--text);}
.btn-wa{background:#25D366;border:none;color:#fff;}.btn-wa:hover{opacity:.85;}
.btn-sm{padding:6px 12px;font-size:11px;}
.btn-blue{background:rgba(91,164,255,0.12);border:1px solid rgba(91,164,255,0.3);color:var(--blue);}

/* SUPPLIER PANEL */
.spanel{width:220px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:14px;}
.sp-title{font-family:var(--mono);font-weight:700;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.sc{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
.sc:hover{border-color:var(--yborder);}.sc.sel{border-color:var(--yellow);background:var(--ydim);}
.sc-name{font-weight:600;font-size:13px;margin-bottom:4px;color:var(--text);}
.sc-price{font-family:var(--mono);font-weight:700;font-size:18px;color:var(--green);}
.sc-sub{font-size:11px;color:var(--muted);font-family:var(--mono);}
.add-sup-btn{width:100%;background:none;border:1px dashed var(--border);color:var(--muted);padding:9px;font-family:var(--mono);font-size:11px;cursor:pointer;border-radius:4px;margin-top:4px;transition:all .2s;}
.add-sup-btn:hover{border-color:var(--yborder);color:var(--yellow);}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--yellow);border-radius:6px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:24px;}
.modal-title{font-family:var(--mono);font-weight:700;font-size:15px;color:var(--yellow);margin-bottom:18px;letter-spacing:1px;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.mgrp{display:flex;flex-direction:column;gap:4px;}.mgrp.full{grid-column:1/-1;}
.mlbl{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-family:var(--mono);}
.minp,.msel,.mta{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 11px;font-family:var(--mono);font-size:13px;border-radius:4px;outline:none;transition:border-color .2s;appearance:none;width:100%;}
.minp:focus,.msel:focus,.mta:focus{border-color:var(--yborder);}.minp::placeholder{color:var(--muted);}
.mta{resize:vertical;min-height:65px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.supp-modal{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--green);border-radius:6px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:24px;}
.supp-modal-title{font-family:var(--mono);font-weight:700;font-size:15px;color:var(--green);margin-bottom:18px;}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--green);padding:11px 16px;font-family:var(--mono);font-size:12px;border-radius:4px;color:var(--text);z-index:500;transform:translateY(60px);opacity:0;transition:all .3s;max-width:300px;}
.toast.show{transform:translateY(0);opacity:1;}

::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* MOBILE */
@media(max-width:768px){
  html,body{overflow:auto;}
  #appShell{height:auto;overflow:auto;}
  .statsbar{padding:8px 12px;gap:8px;}
  .stat{min-width:90px;padding:8px 12px;}
  .stat-val{font-size:16px;}
  .main{flex-direction:column;overflow:visible;}
  .tlist{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:none;overflow:visible;}
  .detail{overflow:visible;}
  .d-inner{padding:12px;}
  .spanel{width:100%;border-left:none;border-top:1px solid var(--border);}
  .cards{grid-template-columns:1fr 1fr;}
  .qb-grid{grid-template-columns:1fr 1fr;}
  .mgrid{grid-template-columns:1fr;}.mgrp.full{grid-column:1;}
  .search-inp{width:100px;}
  .status-row{flex-direction:column;}
  .sr-right{align-items:flex-start;}
}
@media(max-width:480px){
  .status-btns{gap:4px;}
  .sbtn{padding:7px 10px;font-size:10px;}
  .qb-calc{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">KEKELETSO SOLUTIONS</div>
    <div class="login-sub">Operations Dashboard · Internal Only</div>
    <label class="lbl">Email</label>
    <input class="inp" type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
    <label class="lbl">Password</label>
    <input class="inp" type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">ENTER DASHBOARD</button>
    <div class="login-err" id="loginErr">Incorrect email or password</div>
  </div>
</div>

<!-- APP SHELL -->
<div id="appShell">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tb-brand">KEKELETSO</div>
    <div class="tb-sep"></div>
    <div class="tb-title">OPS DASHBOARD</div>
    <div class="tb-right">
      <div class="tb-user" id="tbUser">—</div>
      <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
    </div>
  </div>

  <!-- STATS BAR -->
  <div class="statsbar" id="statsBar">
    <div class="stat"><div class="stat-val" id="st-total">0</div><div class="stat-label">Total Orders</div></div>
    <div class="stat"><div class="stat-val red" id="st-new">0</div><div class="stat-label">New Orders</div></div>
    <div class="stat"><div class="stat-val orange" id="st-pending">0</div><div class="stat-label">Pending Quote</div></div>
    <div class="stat"><div class="stat-val green" id="st-confirmed">0</div><div class="stat-label">Confirmed</div></div>
    <div class="stat"><div class="stat-val blue" id="st-delivered">0</div><div class="stat-label">Delivered</div></div>
    <div class="stat"><div class="stat-val" id="st-volume">0L</div><div class="stat-label">Total Volume</div></div>
  </div>

  <!-- FILTER BAR -->
  <div class="filterbar">
    <button class="fb active" onclick="setFilter('ALL',this)">ALL <span class="fc" id="cnt-ALL">0</span></button>
    <button class="fb" onclick="setFilter('NEW',this)">NEW <span class="fc" id="cnt-NEW">0</span></button>
    <button class="fb" onclick="setFilter('PRICING',this)">PRICING <span class="fc" id="cnt-PRICING">0</span></button>
    <button class="fb" onclick="setFilter('QUOTED',this)">QUOTED <span class="fc" id="cnt-QUOTED">0</span></button>
    <button class="fb" onclick="setFilter('CONFIRMED',this)">CONFIRMED <span class="fc" id="cnt-CONFIRMED">0</span></button>
    <button class="fb" onclick="setFilter('DELIVERED',this)">DELIVERED <span class="fc" id="cnt-DELIVERED">0</span></button>
    <button class="fb" onclick="setFilter('CLOSED',this)">CLOSED <span class="fc" id="cnt-CLOSED">0</span></button>
    <button class="fb" id="hideDoneBtn" onclick="toggleHideDone(this)">HIDE DONE</button>
    <div class="fb-space"></div>
    <input class="search-inp" type="text" placeholder="Search…" id="searchInput" oninput="renderList()">
    <button class="btn btn-y btn-sm" onclick="openNewTicket()" style="margin-left:6px;">+ NEW</button>
    <button class="btn btn-ghost btn-sm" onclick="loadOrders()" style="margin-left:4px;">↻</button>
  </div>

  <!-- MAIN BODY -->
  <div class="main">
    <div class="tlist" id="ticketList">
      <div style="padding:40px 20px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px;">Loading orders…</div>
    </div>
    <div class="detail" id="detailPanel">
      <div class="detail-empty">
        <div class="detail-empty-icon">⛽</div>
        <div class="detail-empty-text">SELECT A TICKET TO VIEW DETAILS</div>
      </div>
    </div>
    <div class="spanel">
      <div class="sp-title">⛽ Suppliers</div>
      <div id="supplierList"></div>
      <button class="add-sup-btn" onclick="openAddSupplier()">+ Add Supplier</button>
    </div>
  </div>
</div>

<!-- NEW TICKET MODAL -->
<div class="modal-overlay" id="newTicketModal">
  <div class="modal">
    <div class="modal-title">NEW TICKET</div>
    <div class="mgrid">
      <div class="mgrp"><label class="mlbl">Company *</label><input class="minp" id="nt-company" placeholder="Company name"></div>
      <div class="mgrp"><label class="mlbl">Contact *</label><input class="minp" id="nt-contact" placeholder="Full name"></div>
      <div class="mgrp"><label class="mlbl">Phone *</label><input class="minp" id="nt-phone" placeholder="072 000 0000"></div>
      <div class="mgrp"><label class="mlbl">Email</label><input class="minp" id="nt-email" type="email" placeholder="email@company.com"></div>
      <div class="mgrp full"><label class="mlbl">Delivery Location *</label><input class="minp" id="nt-location" placeholder="City, Province or address"></div>
      <div class="mgrp"><label class="mlbl">Volume *</label>
        <select class="msel" id="nt-volume">
          <option value="">— Select —</option>
          <option value="10000">10,000 L</option><option value="20000">20,000 L</option>
          <option value="30000">30,000 L</option><option value="40000">40,000 L</option>
          <option value="60000">60,000 L</option><option value="100000">100,000 L</option>
          <option value="custom">Custom</option>
        </select>
      </div>
      <div class="mgrp" id="custom-vol-group" style="display:none;"><label class="mlbl">Custom Volume (L)</label><input class="minp" id="nt-custom-vol" type="number" min="10000" placeholder="e.g. 75000"></div>
      <div class="mgrp"><label class="mlbl">Grade</label>
        <select class="msel" id="nt-grade"><option value="50ppm">50ppm (Standard)</option><option value="500ppm">500ppm</option></select>
      </div>
      <div class="mgrp"><label class="mlbl">Urgency</label>
        <select class="msel" id="nt-delivery">
          <option value="">— Select —</option>
          <option>Urgent (24–48 hrs)</option><option>Within 3 days</option>
          <option>Within 7 days</option><option>Scheduled</option>
        </select>
      </div>
      <div class="mgrp"><label class="mlbl">Agent</label>
        <select class="msel" id="nt-agent">
          <option value="">— Unassigned —</option>
          <option>Katleho Matima</option><option>Mbuyiselo Mbonambi</option><option>Karabo Tladi</option>
        </select>
      </div>
      <div class="mgrp full"><label class="mlbl">Notes</label><textarea class="mta" id="nt-notes" placeholder="Site access, special requirements…"></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('newTicketModal')">CANCEL</button>
      <button class="btn btn-y" onclick="createTicket()">CREATE TICKET</button>
    </div>
  </div>
</div>

<!-- ADD SUPPLIER MODAL -->
<div class="modal-overlay" id="addSupplierModal">
  <div class="supp-modal">
    <div class="supp-modal-title">ADD SUPPLIER</div>
    <div class="mgrid">
      <div class="mgrp full"><label class="mlbl">Supplier Name *</label><input class="minp" id="s-name" placeholder="Company or depot name"></div>
      <div class="mgrp"><label class="mlbl">Contact</label><input class="minp" id="s-contact" placeholder="Name"></div>
      <div class="mgrp"><label class="mlbl">Phone</label><input class="minp" id="s-phone" placeholder="Phone number"></div>
      <div class="mgrp"><label class="mlbl">Depot</label><input class="minp" id="s-depot" placeholder="e.g. Johannesburg Vopak"></div>
      <div class="mgrp"><label class="mlbl">Price per Litre (R)</label><input class="minp" id="s-price" type="number" step="0.01" placeholder="e.g. 17.80"></div>
      <div class="mgrp"><label class="mlbl">Transport (R/km)</label><input class="minp" id="s-transport" type="number" step="0.01" placeholder="e.g. 28.50"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('addSupplierModal')">CANCEL</button>
      <button class="btn btn-g" onclick="saveSupplier()">SAVE SUPPLIER</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentUser=null,tickets=[],suppliers=JSON.parse(localStorage.getItem('keke_suppliers_v2')||'[]'),currentFilter='ALL',selectedId=null,hideDone=false;

// ── AUTH ──
async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim(),pass=document.getElementById('loginPass').value,btn=document.getElementById('loginBtn'),err=document.getElementById('loginErr');
  if(!email||!pass){err.textContent='Please enter email and password';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='SIGNING IN…';err.style.display='none';
  const{data,error}=await db.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent='Incorrect email or password';err.style.display='block';btn.disabled=false;btn.textContent='ENTER DASHBOARD';return;}
  currentUser=data.user.email;showDashboard();
}

async function doLogout(){
  await db.auth.signOut();currentUser=null;tickets=[];
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appShell').style.display='none';
  document.getElementById('loginPass').value='';
  document.getElementById('loginBtn').disabled=false;
  document.getElementById('loginBtn').textContent='ENTER DASHBOARD';
  document.getElementById('loginErr').style.display='none';
}

function showDashboard(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appShell').style.display='flex';
  document.getElementById('tbUser').textContent=currentUser.split('@')[0].toUpperCase();
  loadOrders();renderSuppliers();
}

async function checkSession(){
  const{data:{session}}=await db.auth.getSession();
  if(session){currentUser=session.user.email;showDashboard();}
}

// ── LOAD ORDERS ──
async function loadOrders(){
  document.getElementById('ticketList').innerHTML='<div style="padding:40px 20px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px;">Loading…</div>';
  const{data,error}=await db.from('orders').select('*').order('created_at',{ascending:false});
  if(error){showToast('Error: '+error.message);return;}
  tickets=(data||[]).map((row,i)=>({
    id:row.id,
    code:row.ticket_code||genSeqCode(i+1),
    company:row.company_name||'',
    contact:row.contact_name||'',
    phone:row.phone||'',
    email:row.email||'',
    industry:row.industry||'',
    location:row.location||row.delivery_province||'',
    address:row.delivery_address||'',
    province:row.delivery_province||'',
    volume:row.volume_litres?row.volume_litres.toString():'',
    grade:row.diesel_grade||'50ppm',
    delivery:row.delivery_urgency||'',
    notes:row.notes||'',
    status:row.status||'NEW',
    agent:row.agent||'',
    created:row.created_at,
    updated:row.updated_at||row.created_at
  }));
  render();
  updateStats();
  showToast('Loaded '+tickets.length+' orders');
}

function genSeqCode(n){return 'KDS-'+String(n).padStart(4,'0');}

// ── STATS ──
function updateStats(){
  const total=tickets.length;
  const newOrders=tickets.filter(t=>t.status==='NEW').length;
  const pending=tickets.filter(t=>['PRICING','QUOTED'].includes(t.status)).length;
  const confirmed=tickets.filter(t=>t.status==='CONFIRMED').length;
  const delivered=tickets.filter(t=>t.status==='DELIVERED').length;
  const totalVol=tickets.reduce((sum,t)=>sum+(parseInt(t.volume)||0),0);
  document.getElementById('st-total').textContent=total;
  document.getElementById('st-new').textContent=newOrders;
  document.getElementById('st-pending').textContent=pending;
  document.getElementById('st-confirmed').textContent=confirmed;
  document.getElementById('st-delivered').textContent=delivered;
  document.getElementById('st-volume').textContent=totalVol>=1000000?(totalVol/1000000).toFixed(1)+'M L':totalVol>=1000?(totalVol/1000).toFixed(0)+'K L':totalVol+'L';
}

// ── UPDATE FIELD ──
async function updateField(id,field,value){
  const t=tickets.find(x=>x.id===id);if(!t)return;
  const colMap={status:'status',agent:'agent',notes:'notes'};
  const col=colMap[field]||field;
  const{error}=await db.from('orders').update({[col]:value,updated_at:new Date().toISOString()}).eq('id',id);
  if(error){showToast('Update failed: '+error.message);return;}
  t[field]=value;
  render();
  updateStats();
  renderDetail();
  showToast(field+' → '+value);
}

async function saveNotes(id){
  const val=document.getElementById('notesArea')?.value||'';
  await updateField(id,'notes',val);
}

// ── CREATE TICKET ──
async function createTicket(){
  const company=document.getElementById('nt-company').value.trim(),contact=document.getElementById('nt-contact').value.trim(),phone=document.getElementById('nt-phone').value.trim(),location=document.getElementById('nt-location').value.trim(),volSel=document.getElementById('nt-volume').value;
  if(!company||!contact||!phone||!location||!volSel){showToast('Fill in all required fields');return;}
  const vol=volSel==='custom'?(document.getElementById('nt-custom-vol').value||'10000'):volSel;
  const nextNum=tickets.length+1;
  const row={company_name:company,contact_name:contact,phone,email:document.getElementById('nt-email').value.trim(),location,delivery_address:location,volume_litres:parseInt(vol),diesel_grade:document.getElementById('nt-grade').value,delivery_urgency:document.getElementById('nt-delivery').value,notes:document.getElementById('nt-notes').value.trim(),agent:document.getElementById('nt-agent').value,ticket_code:'KDS-'+String(nextNum).padStart(4,'0'),status:'NEW'};
  const{error}=await db.from('orders').insert(row);
  if(error){showToast('Error: '+error.message);return;}
  closeModal('newTicketModal');showToast('Ticket created ✓');loadOrders();
}

// ── FILTER ──
function setFilter(f,btn){
  currentFilter=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');selectedId=null;renderList();
  document.getElementById('detailPanel').innerHTML='<div class="detail-empty"><div class="detail-empty-icon">⛽</div><div class="detail-empty-text">SELECT A TICKET</div></div>';
}

function toggleHideDone(btn){
  hideDone=!hideDone;
  btn.classList.toggle('active',hideDone);
  btn.textContent=hideDone?'SHOW ALL':'HIDE DONE';
  renderList();
}

// ── RENDER ──
function render(){updateCounts();renderList();}

function updateCounts(){
  ['ALL','NEW','PRICING','QUOTED','CONFIRMED','DELIVERED','CLOSED'].forEach(s=>{
    const el=document.getElementById('cnt-'+s);
    if(el)el.textContent=s==='ALL'?tickets.length:tickets.filter(t=>t.status===s).length;
  });
}

function getFiltered(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  const done=['DELIVERED','CLOSED'];
  return tickets.filter(t=>{
    const mf=currentFilter==='ALL'||t.status===currentFilter;
    const mh=!hideDone||!done.includes(t.status);
    const ms=!q||t.code.toLowerCase().includes(q)||t.company.toLowerCase().includes(q)||(t.location||'').toLowerCase().includes(q)||(t.phone||'').includes(q);
    return mf&&mh&&ms;
  });
}

function renderList(){
  const list=document.getElementById('ticketList'),filtered=getFiltered();
  if(!filtered.length){
    list.innerHTML='<div style="padding:40px 20px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px;">'+(tickets.length===0?'No orders yet.':'No tickets match.')+'</div>';return;
  }
  list.innerHTML=filtered.map(t=>{
    const urgent=['Urgent (24–48 hrs)','Urgent (24–48 hours)'].includes(t.delivery);
    return`<div class="titem ${t.id===selectedId?'active':''}" onclick="selectTicket('${t.id}')">
      ${urgent?'<div class="urgency-dot"></div>':''}
      <div class="ti-top"><div class="ti-code">${t.code}</div><div class="ti-ago">${timeAgo(t.created)}</div></div>
      <div class="ti-company">${t.company}</div>
      <div class="ti-meta"><span class="ti-vol">${fmt(t.volume)}L</span><span>${t.province||t.location||'—'}</span></div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:4px;">
        <span class="badge badge-${t.status}">${t.status}</span>
        ${urgent?'<span style="font-size:10px;color:var(--red);font-family:var(--mono);font-weight:700;">URGENT</span>':''}
        ${t.agent?`<span style="font-size:11px;color:var(--muted);">${t.agent.split(' ')[0]}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function selectTicket(id){selectedId=id;renderList();renderDetail();}

const STATUSES=['NEW','PRICING','QUOTED','CONFIRMED','DELIVERED','CLOSED'];

function renderDetail(){
  const t=tickets.find(x=>x.id===selectedId);if(!t)return;
  const isUrgent=['Urgent (24–48 hrs)','Urgent (24–48 hours)'].includes(t.delivery);
  const statusBtns=STATUSES.map(s=>`<button class="sbtn ${t.status===s?'active-'+s:''}" onclick="updateField('${t.id}','status','${s}')">${s}</button>`).join('');

  document.getElementById('detailPanel').innerHTML=`
  <div class="d-inner">

    <!-- STATUS FIRST -->
    <div class="status-row">
      <div>
        <div class="sr-code">${t.code}</div>
        <div class="sr-company">${t.company}</div>
        <div class="sr-time">Received ${timeAgo(t.created)} · ${new Date(t.created).toLocaleString('en-ZA')}</div>
      </div>
      <div class="sr-right">
        <span class="badge badge-${t.status}">${t.status}</span>
        ${t.agent?`<span style="font-size:12px;color:var(--sub);">${t.agent}</span>`:'<span style="font-size:11px;color:var(--muted);">Unassigned</span>'}
      </div>
    </div>

    <!-- ONE-TAP STATUS UPDATE -->
    <div class="status-btns">${statusBtns}</div>

    <!-- LOCATION + VOLUME CARDS -->
    <div class="cards">
      <div class="card"><div class="card-label">Volume</div><div class="card-val big">${fmt(t.volume)}L</div></div>
      <div class="card"><div class="card-label">Grade</div><div class="card-val">${t.grade||'50ppm'}</div></div>
      <div class="card"><div class="card-label">Province</div><div class="card-val">${t.province||'—'}</div></div>
      <div class="card"><div class="card-label">Urgency</div><div class="card-val ${isUrgent?'urgent':''}">${t.delivery||'—'}</div></div>
    </div>

    <!-- ADDRESS -->
    <div class="card" style="margin-bottom:14px;">
      <div class="card-label">Delivery Address</div>
      <div class="card-val addr">${t.address||t.location||'—'}</div>
    </div>

    <!-- AGENT -->
    <div class="sec">Assign Agent</div>
    <select class="agent-sel" onchange="updateField('${t.id}','agent',this.value)">
      <option value="" ${!t.agent?'selected':''}>— Unassigned —</option>
      <option ${t.agent==='Katleho Matima'?'selected':''}>Katleho Matima</option>
      <option ${t.agent==='Mbuyiselo Mbonambi'?'selected':''}>Mbuyiselo Mbonambi</option>
      <option ${t.agent==='Karabo Tladi'?'selected':''}>Karabo Tladi</option>
    </select>

    <!-- CONTACT -->
    <div class="sec">Client Contact</div>
    <div class="contact-row">
      <div>
        <div class="cr-name">${t.contact}</div>
        <div class="cr-phone">${t.phone}</div>
        <div class="cr-email">${t.email||'—'}</div>
      </div>
      <div class="cr-btns">
        <a href="https://wa.me/${waNum(t.phone)}?text=${encodeURIComponent('Hi, this is Kekeletso Solutions regarding your diesel order '+t.code+'.')}" target="_blank" class="btn btn-wa btn-sm">💬 WhatsApp</a>
        <a href="tel:${t.phone}" class="btn btn-blue btn-sm">📞 Call</a>
      </div>
    </div>

    <!-- QUOTE BUILDER -->
    <div class="sec">Quote Builder</div>
    <div class="qb">
      <div class="qb-title">⛽ ${fmt(t.volume)}L · ${t.grade||'50ppm'} · ${t.address||t.location||'—'}</div>
      <div class="qb-grid">
        <div class="qb-grp"><div class="qb-lbl">Price / Litre (R)</div><input class="qb-inp" id="qb-price" type="number" step="0.01" placeholder="e.g. 18.50" oninput="calcQuote('${t.id}')"></div>
        <div class="qb-grp"><div class="qb-lbl">Transport (R/km)</div><input class="qb-inp" id="qb-transport" type="number" step="0.01" placeholder="e.g. 28.00" oninput="calcQuote('${t.id}')"></div>
        <div class="qb-grp"><div class="qb-lbl">Distance (km)</div><input class="qb-inp" id="qb-km" type="number" placeholder="e.g. 120" oninput="calcQuote('${t.id}')"></div>
        <div class="qb-grp"><div class="qb-lbl">ETA</div><input class="qb-inp" id="qb-eta" placeholder="e.g. 2 days"></div>
        <div class="qb-grp"><div class="qb-lbl">Valid Until</div><input class="qb-inp" id="qb-valid" type="date"></div>
        <div class="qb-grp"><div class="qb-lbl">Supplier</div><input class="qb-inp" id="qb-supplier" placeholder="Supplier name"></div>
      </div>
      <div class="qb-calc" id="qbCalc" style="display:none;">
        <div><div class="qc-lbl">Fuel Cost</div><div class="qc-val" id="qc-fuel">—</div></div>
        <div><div class="qc-lbl">Transport</div><div class="qc-val" id="qc-trans">—</div></div>
        <div><div class="qc-lbl">Total</div><div class="qc-val" id="qc-total">—</div></div>
      </div>
      <div class="qb-btns">
        <button class="btn btn-y" onclick="generateQuote('${t.id}')">GENERATE QUOTE</button>
        <button class="btn btn-ghost" onclick="copyQuote()">COPY</button>
      </div>
    </div>

    <div class="quote-out" id="quoteOutput"></div>
    <div id="quoteActions" style="display:none;margin-bottom:16px;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <a id="waQuoteBtn" href="#" target="_blank" class="btn btn-wa btn-sm">💬 Send via WhatsApp</a>
        <button class="btn btn-ghost btn-sm" onclick="copyQuote()">📋 Copy Text</button>
      </div>
    </div>

    <!-- NOTES -->
    <div class="sec">Internal Notes</div>
    <textarea class="notes-ta" id="notesArea" placeholder="Follow-ups, supplier info, site access notes…">${t.notes||''}</textarea>
    <div style="margin-top:8px;"><button class="btn btn-ghost btn-sm" onclick="saveNotes('${t.id}')">SAVE NOTES</button></div>
    <div style="height:32px;"></div>
  </div>`;

  const d=new Date();d.setDate(d.getDate()+2);
  const vel=document.getElementById('qb-valid');if(vel)vel.value=d.toISOString().slice(0,10);
}

// ── QUOTE ──
function calcQuote(ticketId){
  const t=tickets.find(x=>x.id===ticketId);if(!t)return;
  const price=parseFloat(document.getElementById('qb-price')?.value)||0,trans=parseFloat(document.getElementById('qb-transport')?.value)||0,km=parseFloat(document.getElementById('qb-km')?.value)||0,vol=parseInt(t.volume)||0;
  if(price>0){
    const fc=price*vol,tc=trans*km,total=fc+tc;
    document.getElementById('qbCalc').style.display='grid';
    document.getElementById('qc-fuel').textContent='R'+fc.toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2});
    document.getElementById('qc-trans').textContent=tc>0?'R'+tc.toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';
    document.getElementById('qc-total').textContent='R'+total.toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2});
  }
}

function generateQuote(ticketId){
  const t=tickets.find(x=>x.id===ticketId);if(!t)return;
  const price=parseFloat(document.getElementById('qb-price')?.value)||0,trans=parseFloat(document.getElementById('qb-transport')?.value)||0,km=parseFloat(document.getElementById('qb-km')?.value)||0,supplier=document.getElementById('qb-supplier')?.value||'Kekeletso Supply',eta=document.getElementById('qb-eta')?.value||'To be confirmed',valid=document.getElementById('qb-valid')?.value||'',vol=parseInt(t.volume)||0;
  if(!price){showToast('Enter price per litre first');return;}
  const fc=price*vol,tc=trans*km,total=fc+tc,ppl=total/vol;
  const txt=`DIESEL PRICE QUOTATION\n──────────────────────────\nRef: ${t.code}\nDate: ${new Date().toLocaleDateString('en-ZA')}${valid?'\nValid Until: '+new Date(valid).toLocaleDateString('en-ZA'):''}\n\nCLIENT\nCompany:  ${t.company}\nContact:  ${t.contact}\nLocation: ${t.address||t.location}\n\nORDER\nGrade:    ${t.grade||'50ppm'} Diesel\nVolume:   ${fmt(vol)} Litres\nDelivery: ${eta}\n\nPRICING\nPrice/litre:   R${price.toFixed(2)}\nFuel total:    R${fc.toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2})}${tc>0?'\nTransport:     R'+tc.toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2}):''}\n──────────────────────────\nTOTAL: R${total.toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2})}\nEff. ppl: R${ppl.toFixed(2)}/litre\n──────────────────────────\nSupplier: ${supplier}\n\nQuote subject to availability.\nPayment: COD or approved account.\n\nKekeletso Solutions\n📞 074 488 5562 | 083 979 8578 | +27 76 471 0788\n✉ KekeletsoSolution@gmail.com`;
  document.getElementById('quoteOutput').textContent=txt;
  document.getElementById('quoteOutput').style.display='block';
  document.getElementById('quoteActions').style.display='block';
  const wamsg=`*DIESEL PRICE QUOTATION*\n\nRef: ${t.code}\nCompany: ${t.company}\nVolume: ${fmt(vol)} L\nLocation: ${t.address||t.location}\nGrade: ${t.grade||'50ppm'}\nDelivery: ${eta}\n\n*TOTAL: R${total.toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2})}*\n(R${ppl.toFixed(2)}/litre)\n\nKekeletso Solutions\n074 488 5562`;
  document.getElementById('waQuoteBtn').href=`https://wa.me/${waNum(t.phone)}?text=${encodeURIComponent(wamsg)}`;
  updateField(ticketId,'status','QUOTED');
}

function copyQuote(){const txt=document.getElementById('quoteOutput')?.textContent;if(txt)navigator.clipboard.writeText(txt).then(()=>showToast('Quote copied ✓'));}

// ── SUPPLIERS ──
function renderSuppliers(){
  const list=document.getElementById('supplierList');
  if(!suppliers.length){list.innerHTML='<div style="color:var(--muted);font-family:var(--mono);font-size:11px;line-height:2;">No suppliers yet.</div>';return;}
  list.innerHTML=suppliers.map(s=>`<div class="sc ${s.id===undefined?'':''}" onclick=""><div class="sc-name">${s.name}</div><div class="sc-price">R${parseFloat(s.price||0).toFixed(2)}</div><div class="sc-sub">per litre · ${s.depot||'—'}</div></div>`).join('');
}

function openAddSupplier(){document.getElementById('addSupplierModal').classList.add('open');}
function saveSupplier(){
  const name=document.getElementById('s-name').value.trim();
  if(!name){showToast('Supplier name required');return;}
  const s={id:Date.now().toString(),name,depot:document.getElementById('s-depot').value.trim(),price:document.getElementById('s-price').value,transport:document.getElementById('s-transport').value};
  suppliers.push(s);localStorage.setItem('keke_suppliers_v2',JSON.stringify(suppliers));
  closeModal('addSupplierModal');renderSuppliers();showToast(name+' added ✓');
}

// ── MODALS ──
function openNewTicket(){document.getElementById('newTicketModal').classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
document.getElementById('nt-volume').addEventListener('change',function(){document.getElementById('custom-vol-group').style.display=this.value==='custom'?'block':'none';});
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

// ── TOAST ──
let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3000);}

// ── UTILS ──
function fmt(n){return parseInt(n||0).toLocaleString('en-ZA');}
function waNum(p){return p?p.replace(/\D/g,'').replace(/^0/,'27'):'';}
function timeAgo(iso){const diff=Date.now()-new Date(iso).getTime(),m=Math.floor(diff/60000);if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';}

// ── INIT ──
checkSession();
</script>
